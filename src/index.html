<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="2048、找色差、数独多种小游戏在线玩">
    <meta name="keywords" content="2048,找色差,数独">
    <link rel="stylesheet" href="./assets/css/common.css"/>
    <title>Easy Game - 在线小游戏合集</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 15px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .navigator {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .game-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            text-decoration: none;
            color: #333;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            border-color: #667eea;
        }

        .game-card:hover::before {
            transform: translateX(0);
        }

        .game-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        .game-2048 .game-icon {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .game-color .game-icon {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .game-sudoku .game-icon {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .game-info h3 {
            margin: 0 0 8px 0;
            font-size: 1.4rem;
            color: #333;
        }

        .game-info p {
            margin: 0;
            color: #666;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎮 Easy Game</h1>
        <p>精选经典小游戏合集，随时随地享受游戏乐趣</p>
    </div>
    
    <div class="navigator">
        <a href="./2048/index.html" class="game-card game-2048">
            <div class="game-icon">2048</div>
            <div class="game-info">
                <h3>2048 数字合并</h3>
                <p>滑动合并相同数字，挑战2048高分记录</p>
            </div>
        </a>
        
        <a href="./color-difference/index.html" class="game-card game-color">
            <div class="game-icon">🎨</div>
            <div class="game-info">
                <h3>找色差</h3>
                <p>考验眼力，找出颜色不同的方块</p>
            </div>
        </a>
        
        <a href="./sudoku/index.html" class="game-card game-sudoku">
            <div class="game-icon">9️⃣</div>
            <div class="game-info">
                <h3>数独</h3>
                <p>经典数字逻辑游戏，锻炼思维能力</p>
            </div>
        </a>
    </div>
    
    <div class="footer">
        <p>© 2025 Easy Game - 所有游戏均可免费畅玩</p>
    </div>
</div>
</body>
</html>
