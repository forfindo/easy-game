<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="经典数独在线玩免费网页版，无需下载无广告，打开即玩！支持入门、中级、高级多难度自由切换，电脑手机全屏适配，操作简单易上手，实时记录解题进度，是锻炼逻辑思维、打发碎片时间的优质数独小游戏！">
    <meta name="keywords" content="数独在线玩,免费在线数独,数独小游戏网页版,数独在线玩 无需下载">
    <link rel="stylesheet" href="../assets/css/common.css">
    <title>数独 - 经典逻辑游戏</title>
    <style>
        body {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 15px;
        }

        .game-header h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-header p {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .block-container {
            width: 100%;
            border: 2px solid #333;
            box-sizing: border-box;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            background: white;
            position: relative;
        }

        .block-container::after {
            content: "";
            display: block;
            clear: both;
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            width: 11.11%;
            aspect-ratio: 1;
            font-size: 1.5rem;
            float: left;
            border-right: #ddd 1px solid;
            border-bottom: #ddd 1px solid;
            transition: all 0.2s ease;
            cursor: pointer;
            font-weight: 500;
        }

        .cell:hover {
            background-color: rgba(67, 233, 123, 0.1);
        }

        .cell.error {
            background-color: #ff6b6b !important;
            color: white;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .cell.selected {
            background-color: rgba(67, 233, 123, 0.2) !important;
            box-shadow: inset 0 0 0 2px #43e97b;
        }

        .vd-l {
            border-right: #333 1px solid;
        }

        .vd-r {
            border-left: #333 1px solid;
        }

        .hd-t {
            border-bottom: #333 1px solid;
        }

        .hd-b {
            border-top: #333 1px solid;
        }

        .lc {
            border-right: unset;
        }

        .lr {
            border-bottom: unset;
        }

        .tip {
            color: #666;
            font-size: 1.1rem;
            padding: 15px 0;
            font-weight: 500;
        }

        .value-picker {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 8px;
            padding-bottom: 15px;
        }

        .value-item {
            text-align: center;
            padding: 12px 0;
            box-sizing: border-box;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #333;
        }

        .value-item:hover {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
            border-color: transparent;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(67, 233, 123, 0.3);
        }

        .value-item.clear-value {
            grid-column: 1 / 3;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%);
            color: white;
            border-color: transparent;
        }

        .value-item.clear-value:hover {
            background: linear-gradient(135deg, #ff5252 0%, #ff7b7b 100%);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.3);
        }

        .value-picker.disable .value-item {
            background-color: #f5f5f5;
            color: #bdbdbd;
            cursor: not-allowed;
            border-color: #e0e0e0;
            transform: none;
            box-shadow: none;
        }

        .difficulty-controls {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .difficulty-input {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        #count-input {
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            width: 100px;
            text-align: center;
            transition: border-color 0.3s ease;
        }

        #count-input:focus {
            outline: none;
            border-color: #43e97b;
        }

        #count-submit {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(67, 233, 123, 0.3);
        }

        #count-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(67, 233, 123, 0.4);
        }

        #success-overlay {
            position: absolute;
            inset: 0;
            text-align: center;
            animation: fade-out 1s ease;
            background-color: #FFFFFF
        }

        .success-tip {
            margin-top: 41%;
            color: #43e97b;
            font-size: 1.8rem;
            animation: celebrate 1s ease;
        }

        @keyframes fade-out {
            0% { background-color: transparent }
            100% { background-color: #FFFFFF }
        }

        @keyframes celebrate {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .back-link {
            display: inline-block;
            color: #666;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #43e97b;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="game-header">
        <h1>9️⃣ 数独</h1>
        <p>经典数字逻辑游戏，锻炼思维能力</p>
    </div>
    
    <div class="block-container">
        <div style="display: none" id="success-overlay">
            <h2 class="success-tip">🎉 恭喜过关！</h2>
        </div>
    </div>
    
    <div class="game-controls">
        <p class="tip">请选择数字：</p>
        <div class="value-picker">
            <span class="value-item">1</span>
            <span class="value-item">2</span>
            <span class="value-item">3</span>
            <span class="value-item">4</span>
            <span class="value-item">5</span>
            <span class="value-item">6</span>
            <span class="value-item">7</span>
            <span class="value-item">8</span>
            <span class="value-item">9</span>
            <span class="value-item clear-value">清除</span>
        </div>
    </div>
    
    <div class="difficulty-controls">
        <p class="tip">设置难度（空白块个数）：</p>
        <div class="difficulty-input">
            <input id="count-input" type="number" max="81" min="1" value="40" placeholder="1-81"/>
            <button id="count-submit">🎮 开始新游戏</button>
        </div>
    </div>
    
    <a href="../index.html" class="back-link">← 返回游戏大厅</a>
</div>
<script lang="javascript" src="../assets/js/sudoku.js"></script>
</body>
</html>
